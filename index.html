<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UGC Ad Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    .gradient-text {
        background: linear-gradient(90deg, #4f46e5 0%, #8B5CF6 25%, #D946EF 50%, #ec4899 75%, #f59e0b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        animation: gradient-flow 10s ease infinite;
        background-size: 400% 400%;
    }
    .dark .gradient-text {
        background: linear-gradient(90deg, #38bdf8 0%, #8B5CF6 25%, #D946EF 50%, #ec4899 75%, #fde047 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        animation: gradient-flow 10s ease infinite;
        background-size: 400% 400%;
    }
    @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    #background-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -1;
        overflow: hidden;
    }
    #background-grid {
        position: fixed;
        inset: 0;
        z-index: -2;
        background-image:
            linear-gradient(rgba(139, 92, 246, 0.1) 1px, transparent 1px),
            linear-gradient(to right, rgba(139, 92, 246, 0.1) 1px, transparent 1px);
        background-size: 2.5rem 2.5rem;
        -webkit-mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 40%, transparent 100%);
        mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 40%, transparent 100%);
    }
    .dark #background-grid {
        background-image:
            linear-gradient(rgba(167, 139, 250, 0.15) 1px, transparent 1px),
            linear-gradient(to right, rgba(167, 139, 250, 0.15) 1px, transparent 1px);
    }
    #background-spiral {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 150vmax;
        height: 150vmax;
        min-width: 1200px;
        min-height: 1200px;
        transform: translate(-50%, -50%);
        background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M 50,50 m 0,-45 a 45,45 0 1 1 0,90 a 45,45 0 1 1 0,-90" fill="none" stroke="rgba(217, 70, 239, 0.08)" stroke-width="15" pathLength="1" stroke-dasharray="0.05 0.2" stroke-linecap="round" /></svg>');
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        animation: spin-slow 180s linear infinite;
        opacity: 0.7;
        transition: opacity 0.5s ease, background-image 0.5s ease;
    }
    .dark #background-spiral {
        opacity: 1;
        background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M 50,50 m 0,-45 a 45,45 0 1 1 0,90 a 45,45 0 1 1 0,-90" fill="none" stroke="rgba(139, 92, 246, 0.15)" stroke-width="15" pathLength="1" stroke-dasharray="0.05 0.2" stroke-linecap="round" /></svg>');
    }
    @keyframes spin-slow {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    .char-wrapper {
        overflow: hidden;
        vertical-align: bottom; /* Aligns characters on the same line */
    }

    @keyframes char-in {
        from {
            transform: translateY(-100%);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    .animate-char-in {
        animation: char-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes char-out {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(100%);
            opacity: 0;
        }
    }
    .animate-char-out {
        animation: char-out 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0"
  }
}
</script>
</head>
<body>
  <div id="background-container">
    <div id="background-grid"></div>
    <div id="background-spiral"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
